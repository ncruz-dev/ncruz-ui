<h2 class="title">Dragon Ball Universe</h2>

<div class="row">
  <div class="card" *ngFor="let c of characters()" @fadeIn>

    <div class="image-container">
      <img [src]="c.image" alt="{{c.name}}" />

      <div class="overlay">
        <h3>{{ c.name }}</h3>
        <p class="race">{{ c.race }}</p>
        <p class="ki">Ki: {{ c.maxKi }}</p>
        <p class="desc">{{ c.description }}</p>
      </div>
    </div>

  </div>
</div>
